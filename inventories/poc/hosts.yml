all:
  children:
    iris_nodes:
      hosts:
        irisa:
          ansible_connection: local
          iris_container: irisa
          mirror_role: primary
        irisb:
          ansible_connection: local
          iris_container: irisb
          mirror_role: backup
    # Convenience groups so playbooks can target mirror roles explicitly
    # instead of hardcoding a single machine or namespace.
    iris_primary:
      hosts:
        irisa: {}
    iris_backup:
      hosts:
        irisb: {}
