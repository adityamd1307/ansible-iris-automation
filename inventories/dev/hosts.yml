all:
  children:
    iris_nodes:
      hosts:
        # Replace ansible_host with the real DEV node addresses. The POC
        # uses local docker containers; a real DEV environment typically
        # connects over SSH to VMs/hosts running IRIS.
        iris-dev-a:
          ansible_host: 10.0.10.11
          ansible_user: iris_automation
          iris_container: iris
          mirror_role: primary
        iris-dev-b:
          ansible_host: 10.0.10.12
          ansible_user: iris_automation
          iris_container: iris
          mirror_role: backup
    iris_primary:
      hosts:
        iris-dev-a: {}
    iris_backup:
      hosts:
        iris-dev-b: {}
