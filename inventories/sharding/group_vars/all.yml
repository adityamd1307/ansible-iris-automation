---
# =====================================================================
# Environment: Sharding POC (local docker-compose, Topic 2)
# =====================================================================
# Separate inventory from Topic 1 mirror POC. Never reuse iris_primary /
# iris_backup groups here.

iris_env: sharding
iris_instance: IRIS
iris_exec_mode: docker
stage_dir: /tmp/iris_sharding_automation

# Stack paths (relative to repo root on control node)
sharding_compose_dir: "{{ playbook_dir }}/../../iris-env/IRISShardCluster"
sharding_compose_file: "{{ sharding_compose_dir }}/docker-compose.yml"

# ---------------------------------------------------------------------
# Cluster identity (%SYSTEM.Cluster API — modern terminology)
# ---------------------------------------------------------------------
cluster_name: SHARDPOC
cluster_namespace: SHARDCLUSTER
master_namespace: SHARDMASTER

# Cluster URL for AttachAsDataNode (internal Docker DNS + superserver port)
cluster_url: "IRIS://shard_data1:1972/{{ cluster_namespace }}"

# Semicolon-separated allow list passed to Initialize() / ECP
cluster_allowed_connections: "172.29.0.10;172.29.0.11;172.29.0.12;shard_data1;shard_data2;shard_data3"

# ECP prerequisites (%SYSTEM.Cluster docs: MaxServers / MaxServerConn)
ecp_max_servers: 16
ecp_max_server_conn: 16

# Expected data nodes after attach (node 1 + N attach calls)
sharding_data_node_count: 3
sharding_mirrored: false

# Optional stretch: compute nodes (AttachAsComputeNode) — not in POC compose
sharding_compute_nodes: []

# ---------------------------------------------------------------------
# Demo sharded workload (create_sharded_namespace.yml)
# ---------------------------------------------------------------------
sharded_schema: ShardDemo
sharded_table: Patient
sharded_table_shard_key: MRN

sharded_demo_rows:
  - mrn: MRN-1001
    family_name: Alpha
    given_name: One
  - mrn: MRN-2002
    family_name: Beta
    given_name: Two
  - mrn: MRN-3003
    family_name: Gamma
    given_name: Three

# Gate: set true only after version-license-gate.md checklist passes
sharding_hands_on_enabled: false

# Validation
sharding_enforce_node_count: true
sharding_enforce_demo_table: true
