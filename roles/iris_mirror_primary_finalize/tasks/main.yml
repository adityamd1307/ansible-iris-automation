---
- name: Stage and push primary add-failover script
  ansible.builtin.include_role:
    name: iris_common
    tasks_from: push_file
  vars:
    src_template: "{{ playbook_dir }}/../objectscript/setup_mirror_primary_add_failover.cos.j2"
    staged_name: "setup_mirror_primary_add_failover.cos"
    remote_path: "/tmp/setup_mirror_primary_add_failover.cos"

- name: Ensure ISCAgent is running before add-failover
  ansible.builtin.include_role:
    name: iris_common
    tasks_from: start_iscagent

- name: Register backup as failover member on primary
  ansible.builtin.include_role:
    name: iris_common
    tasks_from: iris_session
  vars:
    remote_path: "/tmp/setup_mirror_primary_add_failover.cos"
    session_label: "mirror primary add failover"
    session_changed_when: "'ADD FAILOVER' in (session_result.stdout | default(''))"

- name: Show primary add-failover output
  ansible.builtin.debug:
    msg: "{{ session_result.stdout_lines | default([]) }}"

- name: Assert primary add-failover succeeded
  ansible.builtin.assert:
    that:
      - "'ERROR #' not in (session_result.stdout | default(''))"
      - "'ROLE DRIFT' not in (session_result.stdout | default(''))"
    fail_msg: "Primary add-failover failed; see output above."
    success_msg: "Backup registered as failover member on primary."
