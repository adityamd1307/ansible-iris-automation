---
- name: Ensure Interoperability temp directory exists inside container (docker)
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - --user
      - root
      - "{{ iris_container | default(inventory_hostname) }}"
      - mkdir
      - -p
      - "{{ production.temp_directory | default(databases[0].directory ~ '/' ~ (globals_db | lower) ~ 'enstemp') }}"
  changed_when: false
  when: iris_exec_mode == 'docker'

- name: Set Interoperability temp directory ownership inside container (docker)
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - --user
      - root
      - "{{ iris_container | default(inventory_hostname) }}"
      - chown
      - irisowner:irisowner
      - "{{ production.temp_directory | default(databases[0].directory ~ '/' ~ (globals_db | lower) ~ 'enstemp') }}"
  changed_when: false
  when: iris_exec_mode == 'docker'

- name: Ensure Interoperability temp directory exists on host (direct)
  ansible.builtin.file:
    path: "{{ production.temp_directory | default(databases[0].directory ~ '/' ~ (globals_db | lower) ~ 'enstemp') }}"
    state: directory
    mode: "0755"
  when: iris_exec_mode == 'direct'

- name: Stage and push production class sources
  ansible.builtin.include_role:
    name: iris_common
    tasks_from: push_file
  loop: "{{ production.classes | default([]) }}"
  loop_control:
    loop_var: production_class
    label: "{{ production_class.name }}"
  vars:
    src_template: "{{ playbook_dir }}/../{{ production_class.src }}"
    staged_name: "{{ production_class.name }}"
    remote_path: "{{ production_class.remote }}"

- name: Stage and push production class import script
  ansible.builtin.include_role:
    name: iris_common
    tasks_from: push_file
  vars:
    src_template: "{{ playbook_dir }}/../objectscript/import_production_classes.cos.j2"
    staged_name: "import_production_classes.cos"
    remote_path: "/tmp/import_production_classes.cos"

- name: Import and compile production classes
  ansible.builtin.include_role:
    name: iris_common
    tasks_from: iris_session
  vars:
    remote_path: "/tmp/import_production_classes.cos"
    session_label: "production class import"
    session_changed_when: "'LOAD ' in (session_result.stdout | default('')) and 'SKIP production-class-import' not in (session_result.stdout | default(''))"

- name: Show production class import output
  ansible.builtin.debug:
    msg: "{{ session_result.stdout_lines | default([]) }}"

- name: Assert production class import succeeded when interop is available
  ansible.builtin.assert:
    that:
      - "'ERROR #' not in (session_result.stdout | default(''))"
      - >-
        ('REGISTER PRODUCTION CONFIG' in (session_result.stdout | default(''))
        or 'EXISTS PRODUCTION CONFIG' in (session_result.stdout | default(''))
        or 'SKIP production-config-register' in (session_result.stdout | default('')))
    fail_msg: "Production class import or config registration failed; see output above."
    success_msg: "Production class import and config registration completed or skipped cleanly."
  when: "'SKIP production-class-import' not in (session_result.stdout | default(''))"
