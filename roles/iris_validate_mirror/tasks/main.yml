---
- name: Check arbiter endpoint is reachable (once per run)
  ansible.builtin.wait_for:
    host: "{{ mirror_arbiter_host }}"
    port: "{{ mirror_arbiter_port }}"
    timeout: 30
  delegate_to: localhost
  run_once: true
  when: mirror_enabled | bool

- name: Stage and push mirror validation script
  ansible.builtin.include_role:
    name: iris_common
    tasks_from: push_file
  vars:
    src_template: "{{ playbook_dir }}/../objectscript/validate_mirror.cos.j2"
    staged_name: "validate_mirror.cos"
    remote_path: "/tmp/validate_mirror.cos"

- name: Run mirror validation (read-only)
  ansible.builtin.include_role:
    name: iris_common
    tasks_from: iris_session
  vars:
    remote_path: "/tmp/validate_mirror.cos"
    session_label: "mirror readiness"

- name: Extract and parse machine-readable mirror readiness result
  ansible.builtin.set_fact:
    mirror: >-
      {{ (session_result.stdout_lines
          | select('match', '^MIRROR_JSON:')
          | list | last | regex_replace('^MIRROR_JSON:', '')) | from_json }}

- name: Show machine-readable mirror readiness result
  ansible.builtin.debug:
    msg: "{{ mirror }}"

- name: Assert node reports mirror readiness prerequisites
  ansible.builtin.assert:
    that:
      - mirror.instance_reachable == true
      - not (mirror_requires_journaling | bool) or (mirror.journaling_enabled == true)
      - not (mirror_enabled | bool) or (mirror.is_mirror_member == true)
      - (mirror.expected_role != 'primary') or (mirror.is_primary == true)
      - (mirror.expected_role != 'backup') or (mirror.is_backup == true)
    fail_msg: "Mirror readiness FAILED on {{ inventory_hostname }} (see JSON above)."
    success_msg: "Mirror readiness OK on {{ inventory_hostname }} (role: {{ mirror_role | default('n/a') }})."

- name: Write mirror readiness evidence (optional)
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/../evidence/mirror-readiness-{{ iris_env }}-{{ inventory_hostname }}.json"
    content: "{{ mirror | to_nice_json }}\n"
    mode: "0644"
  delegate_to: localhost
  when: write_evidence | bool
