---
# Reusable: run an ObjectScript file through `iris session` via stdin.
#
# Required vars:
#   remote_path : absolute path of the .cos script on/in the node
# Optional:
#   session_label : human label for output
#   session_no_log : true to suppress output (e.g. security/password ops)
#   session_changed_when : override changed_when expression (default false)
#
# Registers: session_result (combined).

- name: "iris session (docker) - {{ session_label | default(remote_path) }}"
  ansible.builtin.shell: >-
    docker exec -i {{ iris_container | default(inventory_hostname) }}
    sh -c "iris session {{ iris_instance | default('IRIS') }} < {{ remote_path }}"
  register: session_docker
  changed_when: "{{ session_changed_when | default(false) }}"
  no_log: "{{ session_no_log | default(false) }}"
  when: iris_exec_mode == 'docker'

- name: "iris session (direct) - {{ session_label | default(remote_path) }}"
  ansible.builtin.shell: >-
    iris session {{ iris_instance | default('IRIS') }} < {{ remote_path }}
  register: session_direct
  changed_when: "{{ session_changed_when | default(false) }}"
  no_log: "{{ session_no_log | default(false) }}"
  when: iris_exec_mode == 'direct'

- name: "Normalize session result - {{ session_label | default(remote_path) }}"
  ansible.builtin.set_fact:
    session_result: "{{ session_docker if iris_exec_mode == 'docker' else session_direct }}"
