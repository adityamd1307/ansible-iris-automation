---
# =====================================================================
# Post-sync security validation (read-only)
# =====================================================================
# Verifies required roles/users exist and reports counts via JSON.
#
# Run: ansible-playbook playbooks/validate_security_sync.yml -i inventories/poc
- name: Validate IRIS security sync state
  hosts: iris_nodes
  become: false
  gather_facts: false
  vars:
    security_sync_invoke_remote: /tmp/invoke_security_sync.cos
    security_sync_invoke_staged: invoke_security_sync.cos
    write_evidence: false

  tasks:
    - name: Skip validation when security sync disabled
      ansible.builtin.meta: end_play
      when: not (security_sync_enabled | default(false) | bool)

    - name: Load SecuritySync ObjectScript classes
      ansible.builtin.include_role:
        name: iris_common
        tasks_from: install_security_sync

    - name: Stage and push validate invoke script
      ansible.builtin.include_role:
        name: iris_common
        tasks_from: push_file
      vars:
        src_template: "{{ playbook_dir }}/../objectscript/invoke_security_sync.cos.j2"
        staged_name: "{{ security_sync_invoke_staged }}"
        remote_path: "{{ security_sync_invoke_remote }}"
        security_sync_action: validate

    - name: Run security sync validation (read-only)
      ansible.builtin.include_role:
        name: iris_common
        tasks_from: iris_session
      vars:
        remote_path: "{{ security_sync_invoke_remote }}"
        session_label: "security sync validate"

    - name: Parse validate SECURITY_SYNC_JSON
      ansible.builtin.set_fact:
        security_sync_validate: >-
          {{ (session_result.stdout_lines
              | select('match', '^SECURITY_SYNC_JSON:')
              | list | last | regex_replace('^SECURITY_SYNC_JSON:', '')) | from_json }}

    - name: Show validation result
      ansible.builtin.debug:
        msg: "{{ security_sync_validate }}"

    - name: Assert required security objects present
      ansible.builtin.assert:
        that:
          - security_sync_validate.ok | bool
          - security_sync_validate.role_count | int >= 0
          - security_sync_validate.user_count | int >= 0
        fail_msg: "Security sync validation FAILED on {{ inventory_hostname }} (see JSON above)."
        success_msg: "Security sync validation OK on {{ inventory_hostname }}."

    - name: Write validation evidence (optional)
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../evidence/security-sync-validate-{{ iris_env }}-{{ inventory_hostname }}.json"
        content: "{{ security_sync_validate | to_nice_json }}\n"
        mode: "0644"
      delegate_to: localhost
      when: write_evidence | bool

    - name: Remove validate invoke script from container (docker)
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -u
          - root
          - "{{ iris_container | default(inventory_hostname) }}"
          - rm
          - -f
          - "{{ security_sync_invoke_remote }}"
      changed_when: false
      when: iris_exec_mode == 'docker'

    - name: Remove validate invoke script from host (direct)
      ansible.builtin.file:
        path: "{{ security_sync_invoke_remote }}"
        state: absent
      when: iris_exec_mode == 'direct'

    - name: Remove staged validate script from control node
      ansible.builtin.file:
        path: "{{ stage_dir }}/{{ inventory_hostname }}-invoke_security_sync.cos"
        state: absent
      delegate_to: localhost
