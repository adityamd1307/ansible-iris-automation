---
- name: Validate IRIS Nodes Readiness
  hosts: iris_nodes
  become: false
  gather_facts: false

  tasks:
    - name: Load IRIS configuration variables
      include_vars:
        file: "{{ playbook_dir }}/../group_vars/iris_nodes.yml"

    - name: Ensure local target directory for validation scripts exists
      file:
        path: /tmp/iris_automation
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Create ObjectScript validation script
      copy:
        dest: "/tmp/iris_automation/{{ inventory_hostname }}-validate_readiness.os"
        content: |
          zn "%SYS"
          set nsExists = ##class(%SYS.Namespace).Exists("{{ namespace }}")
          set glbExists = ##class(SYS.Database).%ExistsId("/usr/irissys/mgr/{{ globals_db | lower }}")
          set rtnExists = ##class(SYS.Database).%ExistsId("/usr/irissys/mgr/{{ routines_db | lower }}")
          set webAppExists = ##class(Security.Applications).Exists("{{ web_apps[0] }}")

          set autoStartProd = ""
          if nsExists {
            zn "{{ namespace }}"
            set autoStartProd = $get(^Ens.AutoStart)
          }

          write !, "--- VALIDATION JSON ---"
          write !, "{"
          write !, "  ""node"": """_$System.INetInfo.LocalHostName()_""","
          write !, "  ""namespace"": ""{{ namespace }}"","
          write !, "  ""namespace_exists"": "_$select(nsExists:"true",1:"false")_","
          write !, "  ""globals_db_exists"": "_$select(glbExists:"true",1:"false")_","
          write !, "  ""routines_db_exists"": "_$select(rtnExists:"true",1:"false")_","
          write !, "  ""webapp_exists"": "_$select(webAppExists:"true",1:"false")_","
          write !, "  ""production_autostart"": """_autoStartProd_""""
          write !, "}"
          write !, "--- END VALIDATION ---"
          halt
        mode: '0644'
      delegate_to: localhost

    - name: Run validation script via iris session
      shell: docker exec -i {{ inventory_hostname }} iris session IRIS < /tmp/iris_automation/{{ inventory_hostname }}-validate_readiness.os
      register: validation_output
      changed_when: false

    - name: Extract JSON output from ObjectScript execution
      set_fact:
        validation_json: "{{ validation_output.stdout.split('--- VALIDATION JSON ---')[1].split('--- END VALIDATION ---')[0] }}"
    - name: Show machine-readable JSON results
      debug:
        msg: "{{ validation_json | from_json }}"

    - name: Assert configuration exists
      assert:
        that:
          - (validation_json | from_json).namespace_exists == true
          - (validation_json | from_json).globals_db_exists == true
          - (validation_json | from_json).routines_db_exists == true
          - (validation_json | from_json).webapp_exists == true
          - (validation_json | from_json).production_autostart == production.class
        fail_msg: "Validation failed: configuration is missing on {{ inventory_hostname }}"
        success_msg: "Validation passed: node {{ inventory_hostname }} is application-ready."
