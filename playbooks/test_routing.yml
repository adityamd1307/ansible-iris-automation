---
# =====================================================================
# HAProxy routing smoke test (:8080 → active primary Web Gateway → IRIS)
# =====================================================================
# Imports update_haproxy_primary.yml first, then GET UtilHome.csp.
#
# Run: ansible-playbook playbooks/test_routing.yml -i inventories/poc
# See docs/routing-overview.md
- import_playbook: update_haproxy_primary.yml

- name: Test HAProxy to IRIS Application Routing
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Ensure HAProxy routes to IRIS Web Gateway
      ansible.builtin.uri:
        url: "http://localhost:8080/csp/sys/UtilHome.csp"
        method: GET
        status_code: 200
        return_content: true
      register: web_response
      failed_when: "'InterSystems IRIS' not in web_response.content"

    - name: Output success message
      ansible.builtin.debug:
        msg: >-
          Routing test passed. HAProxy :8080 serves IRIS via backend
          {{ haproxy_backend_host | default('(see update_haproxy_primary)') }}.
