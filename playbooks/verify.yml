- name: Verify the local IRIS stack
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    project_root: "{{ playbook_dir }}/.."
    compose_file: "{{ project_root }}/docker-compose.yml"

  tasks:
    - name: Wait for published service ports
      ansible.builtin.wait_for:
        host: "{{ item.host }}"
        port: "{{ item.port }}"
        timeout: 180
        delay: 2
      loop: "{{ service_ports }}"
      loop_control:
        label: "{{ item.name }} on {{ item.host }}:{{ item.port }}"

    - name: List running compose services
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-name
          - "{{ compose_project_name }}"
          - --file
          - "{{ compose_file }}"
          - ps
        chdir: "{{ project_root }}"
      register: compose_ps
      changed_when: false
      environment:
        IRISTAG: "{{ iris_image }}"
        WEBGTAG: "{{ webgateway_image }}"

    - name: Show compose service status
      ansible.builtin.debug:
        msg: "{{ compose_ps.stdout_lines }}"
