---
# =====================================================================
# Production auto-start on mirror primary (Ens.Director)
# =====================================================================
# Namespace-level setting; journaled globals replicate auto-start to backup.
# Run after setup_production_import.yml and mirror finalize.
#
# Run: ansible-playbook playbooks/setup_production_autostart.yml -i inventories/poc
# See docs/production-overview.md
- name: Configure production auto-start on mirror primary
  hosts: iris_primary
  become: false
  gather_facts: false
  vars:
    production_run_import: false
    production_run_autostart: true

  roles:
    - iris_production
