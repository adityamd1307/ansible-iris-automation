- name: Stop the local IRIS stack
  hosts: localhost
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir }}/.."
    compose_file: "{{ project_root }}/docker-compose.yml"

  tasks:
    - name: Load shared stack variables
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/all.yml"

    - name: Stop containers with docker compose
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-name
          - "{{ compose_project_name }}"
          - --file
          - "{{ compose_file }}"
          - down
        chdir: "{{ project_root }}"
      register: compose_down
      changed_when: "'Removed' in (compose_down.stdout ~ compose_down.stderr)"
      environment:
        IRISTAG: "{{ iris_image }}"
        WEBGTAG: "{{ webgateway_image }}"

    - name: Show compose output
      ansible.builtin.debug:
        msg: "{{ (compose_down.stdout_lines + compose_down.stderr_lines) | default([]) }}"
