---
# =====================================================================
# Primary → backup security sync (roles + users via Security.* Export/Import)
# =====================================================================
# Exports roles/users XML on primary, transfers via control node, imports
# on backup. Gated by mirror_enabled and security_sync_enabled.
#
# Real import (E2E):
#   ansible-playbook playbooks/sync_security.yml -i inventories/poc \
#     -e security_sync_enabled=true -e security_sync_dry_run=false
#
# Dry-run import only:
#   ansible-playbook playbooks/sync_security.yml -i inventories/poc \
#     -e security_sync_enabled=true -e security_sync_dry_run=true
#
# Gated by mirror_enabled AND security_sync_enabled (inventory or -e).
# See docs/security-overview.md for Portal checks and troubleshooting.
- name: Install SecuritySync module on all nodes
  # Compile SecuritySync.* into %SYS before any export/import/validate action.
  hosts: iris_nodes
  become: false
  gather_facts: false
  tasks:
    - name: Load SecuritySync ObjectScript classes
      ansible.builtin.include_role:
        name: iris_common
        tasks_from: install_security_sync
      when: (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)

- name: Export security from primary
  # Export roles/users XML on primary; optional E2E delta; fetch XML to control node.
  # XML contains password hashes — fetch tasks use no_log; paths deleted in cleanup play.
  hosts: iris_primary
  become: false
  gather_facts: false
  vars:
    security_sync_stage: "{{ stage_dir }}/security-sync"
    security_sync_invoke_remote: /tmp/invoke_security_sync.cos
    security_sync_invoke_staged: invoke_security_sync.cos
  tasks:
    - name: Ensure control-node security sync stage dir exists
      ansible.builtin.file:
        path: "{{ security_sync_stage }}"
        state: directory
        mode: "0750"
      delegate_to: localhost
      run_once: true
      when: (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)

    - name: Create E2E test delta on primary (optional)
      # Creates SYNC_TEST_ROLE + sync_test_user and bumps TRAINING_APP description
      # so a demo can prove backup received primary-only changes before export.
      when:
        - (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)
        - security_sync_create_test_delta | default(false) | bool
      block:
        - name: Stage and push create_test_delta invoke script
          ansible.builtin.include_role:
            name: iris_common
            tasks_from: push_file
          vars:
            src_template: "{{ playbook_dir }}/../objectscript/invoke_security_sync.cos.j2"
            staged_name: "{{ security_sync_invoke_staged }}"
            remote_path: "{{ security_sync_invoke_remote }}"
            security_sync_action: create_test_delta

        - name: Run create_test_delta on primary
          ansible.builtin.include_role:
            name: iris_common
            tasks_from: iris_session
          vars:
            remote_path: "{{ security_sync_invoke_remote }}"
            session_label: "security sync create test delta"
            session_changed_when: "'CREATED' in (session_result.stdout | default('')) or 'UPDATED' in (session_result.stdout | default(''))"

    - name: Stage and push export invoke script
      ansible.builtin.include_role:
        name: iris_common
        tasks_from: push_file
      vars:
        src_template: "{{ playbook_dir }}/../objectscript/invoke_security_sync.cos.j2"
        staged_name: "{{ security_sync_invoke_staged }}"
        remote_path: "{{ security_sync_invoke_remote }}"
        security_sync_action: export
      when: (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)

    - name: Run security export on primary
      ansible.builtin.include_role:
        name: iris_common
        tasks_from: iris_session
      vars:
        remote_path: "{{ security_sync_invoke_remote }}"
        session_label: "security sync export"
        session_changed_when: "'Roles exported' in (session_result.stdout | default(''))"
      when: (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)

    - name: Collect SECURITY_SYNC_JSON lines from session output
      ansible.builtin.set_fact:
        security_sync_json_lines: "{{ session_result.stdout_lines | default([]) | select('match', '^SECURITY_SYNC_JSON:') | list }}"
      when: (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)

    - name: Fail when export JSON is missing from session output
      ansible.builtin.fail:
        msg: >-
          Security export on {{ inventory_hostname }} produced no SECURITY_SYNC_JSON line.
          Check SecuritySync install and session output.
      when:
        - (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)
        - security_sync_json_lines | default([]) | length == 0

    - name: Parse export SECURITY_SYNC_JSON
      ansible.builtin.set_fact:
        security_sync_export: >-
          {{ (security_sync_json_lines | last | regex_replace('^SECURITY_SYNC_JSON:', '')) | from_json }}
      when: (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)

    - name: Show export result (counts only)
      ansible.builtin.debug:
        msg:
          ok: "{{ security_sync_export.ok }}"
          step: "{{ security_sync_export.step }}"
          roles_exported: "{{ security_sync_export.roles_exported }}"
          users_exported: "{{ security_sync_export.users_exported }}"
      when: (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)

    - name: Assert export succeeded
      ansible.builtin.assert:
        that:
          - security_sync_export.ok | bool
          - security_sync_export.roles_exported | int > 0
          - security_sync_export.users_exported | int > 0
        fail_msg: "Security export failed on primary (see SECURITY_SYNC_JSON above)."
      when: (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)

    - name: Fetch roles XML from primary to control node
      # Staging on control node bridges docker/direct exec modes on backup import.
      ansible.builtin.include_role:
        name: iris_common
        tasks_from: fetch_file
      vars:
        remote_path: "{{ security_sync_roles_path | default('/tmp/iris_security_roles.xml') }}"
        local_path: "{{ security_sync_stage }}/{{ inventory_hostname }}-iris_security_roles.xml"
      no_log: true
      when: (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)

    - name: Fetch users XML from primary to control node
      ansible.builtin.include_role:
        name: iris_common
        tasks_from: fetch_file
      vars:
        remote_path: "{{ security_sync_users_path | default('/tmp/iris_security_users.xml') }}"
        local_path: "{{ security_sync_stage }}/{{ inventory_hostname }}-iris_security_users.xml"
      no_log: true
      when: (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool)

- name: Import security on backup
  # Copy staged XML into backup, then dry-run (Flags=1) or real import (Flags=0).
  # security_sync_dry_run defaults true in group_vars unless overridden at CLI.
  hosts: iris_backup
  become: false
  gather_facts: false
  vars:
    security_sync_stage: "{{ stage_dir }}/security-sync"
    security_sync_invoke_remote: /tmp/invoke_security_sync.cos
    security_sync_invoke_staged: invoke_security_sync.cos
    security_sync_primary_host: "{{ groups['iris_primary'][0] }}"
    security_sync_gate: "{{ (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool) }}"
  tasks:
    - name: Copy roles XML into backup container
      ansible.builtin.command:
        argv:
          - docker
          - cp
          - "{{ security_sync_stage }}/{{ security_sync_primary_host }}-iris_security_roles.xml"
          - "{{ iris_container | default(inventory_hostname) }}:{{ security_sync_roles_path | default('/tmp/iris_security_roles.xml') }}"
      changed_when: false
      no_log: true
      when:
        - security_sync_gate | bool
        - iris_exec_mode == 'docker'

    - name: Copy users XML into backup container
      ansible.builtin.command:
        argv:
          - docker
          - cp
          - "{{ security_sync_stage }}/{{ security_sync_primary_host }}-iris_security_users.xml"
          - "{{ iris_container | default(inventory_hostname) }}:{{ security_sync_users_path | default('/tmp/iris_security_users.xml') }}"
      changed_when: false
      no_log: true
      when:
        - security_sync_gate | bool
        - iris_exec_mode == 'docker'

    - name: Copy roles XML onto backup host (direct)
      ansible.builtin.copy:
        src: "{{ security_sync_stage }}/{{ security_sync_primary_host }}-iris_security_roles.xml"
        dest: "{{ security_sync_roles_path | default('/tmp/iris_security_roles.xml') }}"
        mode: "0600"
      no_log: true
      when:
        - security_sync_gate | bool
        - iris_exec_mode == 'direct'

    - name: Copy users XML onto backup host (direct)
      ansible.builtin.copy:
        src: "{{ security_sync_stage }}/{{ security_sync_primary_host }}-iris_security_users.xml"
        dest: "{{ security_sync_users_path | default('/tmp/iris_security_users.xml') }}"
        mode: "0600"
      no_log: true
      when:
        - security_sync_gate | bool
        - iris_exec_mode == 'direct'

    - name: Dry-run import on backup
      # Validates XML and reports counts without mutating IRISSECURITY on backup.
      when:
        - security_sync_gate | bool
        - security_sync_dry_run | default(true) | bool
      block:
        - name: Stage and push dry_run_import invoke script
          ansible.builtin.include_role:
            name: iris_common
            tasks_from: push_file
          vars:
            src_template: "{{ playbook_dir }}/../objectscript/invoke_security_sync.cos.j2"
            staged_name: "{{ security_sync_invoke_staged }}"
            remote_path: "{{ security_sync_invoke_remote }}"
            security_sync_action: dry_run_import

        - name: Run dry-run import on backup
          ansible.builtin.include_role:
            name: iris_common
            tasks_from: iris_session
          vars:
            remote_path: "{{ security_sync_invoke_remote }}"
            session_label: "security sync dry-run import"

        - name: Parse dry-run SECURITY_SYNC_JSON
          ansible.builtin.set_fact:
            security_sync_dry_run_result: >-
              {{ (session_result.stdout_lines
                  | select('match', '^SECURITY_SYNC_JSON:')
                  | list | last | regex_replace('^SECURITY_SYNC_JSON:', '')) | from_json }}

        - name: Show dry-run import result
          ansible.builtin.debug:
            msg:
              ok: "{{ security_sync_dry_run_result.ok }}"
              dry_run: "{{ security_sync_dry_run_result.dry_run }}"
              roles_imported: "{{ security_sync_dry_run_result.roles_imported }}"
              users_imported: "{{ security_sync_dry_run_result.users_imported }}"

        - name: Assert dry-run import succeeded
          ansible.builtin.assert:
            that:
              - security_sync_dry_run_result.ok | bool
              - security_sync_dry_run_result.dry_run | bool
            fail_msg: "Security dry-run import failed on backup."

    - name: Real import on backup
      # Applies primary export to backup; post-import Validator runs inside Service.
      when:
        - security_sync_gate | bool
        - not (security_sync_dry_run | default(true) | bool)
      block:
        - name: Stage and push import invoke script
          ansible.builtin.include_role:
            name: iris_common
            tasks_from: push_file
          vars:
            src_template: "{{ playbook_dir }}/../objectscript/invoke_security_sync.cos.j2"
            staged_name: "{{ security_sync_invoke_staged }}"
            remote_path: "{{ security_sync_invoke_remote }}"
            security_sync_action: import

        - name: Run import on backup
          ansible.builtin.include_role:
            name: iris_common
            tasks_from: iris_session
          vars:
            remote_path: "{{ security_sync_invoke_remote }}"
            session_label: "security sync import"
            session_changed_when: "'imported' in (session_result.stdout | default(''))"

        - name: Parse import SECURITY_SYNC_JSON
          ansible.builtin.set_fact:
            security_sync_import: >-
              {{ ((session_result.stdout_lines | default([]))
                  | select('match', '^SECURITY_SYNC_JSON:')
                  | list | last | default('{}') | regex_replace('^SECURITY_SYNC_JSON:', '')) | from_json }}

        - name: Show import result
          ansible.builtin.debug:
            msg:
              ok: "{{ security_sync_import.ok }}"
              step: "{{ security_sync_import.step }}"
              roles_imported: "{{ security_sync_import.roles_imported }}"
              users_imported: "{{ security_sync_import.users_imported }}"
              role_count: "{{ security_sync_import.role_count | default('n/a') }}"
              user_count: "{{ security_sync_import.user_count | default('n/a') }}"

        - name: Assert import succeeded
          ansible.builtin.assert:
            that:
              - security_sync_import.ok | bool
              - security_sync_import.roles_imported | int > 0
              - security_sync_import.users_imported | int > 0
            fail_msg: "Security import failed on backup (see SECURITY_SYNC_JSON above)."

        - name: Write security sync evidence (optional)
          ansible.builtin.copy:
            dest: "{{ playbook_dir }}/../evidence/security-sync-poc.json"
            content: "{{ security_sync_import | to_nice_json }}\n"
            mode: "0644"
          delegate_to: localhost
          when: write_evidence | default(false) | bool

- name: Cleanup security sync artifacts
  # Delete XML and invoke scripts on nodes and control node — sensitive export files must not linger.
  hosts: iris_nodes
  become: false
  gather_facts: false
  vars:
    security_sync_invoke_remote: /tmp/invoke_security_sync.cos
    security_sync_roles: "{{ security_sync_roles_path | default('/tmp/iris_security_roles.xml') }}"
    security_sync_users: "{{ security_sync_users_path | default('/tmp/iris_security_users.xml') }}"
    security_sync_gate: "{{ (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool) }}"
  tasks:
    - name: Remove security XML and invoke script from container (docker)
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -u
          - root
          - "{{ iris_container | default(inventory_hostname) }}"
          - rm
          - -f
          - "{{ security_sync_roles }}"
          - "{{ security_sync_users }}"
          - "{{ security_sync_invoke_remote }}"
      changed_when: false
      when:
        - security_sync_gate | bool
        - iris_exec_mode == 'docker'

    - name: Remove security XML and invoke script from host (direct)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ security_sync_roles }}"
        - "{{ security_sync_users }}"
        - "{{ security_sync_invoke_remote }}"
      when:
        - security_sync_gate | bool
        - iris_exec_mode == 'direct'

    - name: Remove staged invoke script from control node
      ansible.builtin.file:
        path: "{{ stage_dir }}/{{ inventory_hostname }}-invoke_security_sync.cos"
        state: absent
      delegate_to: localhost
      when: security_sync_gate | bool

- name: Cleanup control-node staged security XML
  # Remove primary-export copies from stage_dir after backup import completes.
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    security_sync_stage: "{{ stage_dir }}/security-sync"
    security_sync_primary_host: "{{ groups['iris_primary'][0] }}"
    security_sync_gate: "{{ (mirror_enabled | default(false) | bool) and (security_sync_enabled | default(false) | bool) }}"
  tasks:
    - name: Remove staged security XML from control node
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ security_sync_stage }}/{{ security_sync_primary_host }}-iris_security_roles.xml"
        - "{{ security_sync_stage }}/{{ security_sync_primary_host }}-iris_security_users.xml"
      when: security_sync_gate | bool
