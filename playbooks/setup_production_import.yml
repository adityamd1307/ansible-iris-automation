---
# =====================================================================
# Import production classes on mirror primary only (M6)
# =====================================================================
# Classes compile into TRAININGCODE; mirrored routines replicate to backup.
# Ens.Config.Production registered on primary. Does not run autostart.
#
# Run: ansible-playbook playbooks/setup_production_import.yml -i inventories/poc
# See docs/production-overview.md
- name: Import production classes on mirror primary
  hosts: iris_primary
  become: false
  gather_facts: false
  vars:
    production_run_import: true
    production_run_autostart: false

  roles:
    - iris_production
