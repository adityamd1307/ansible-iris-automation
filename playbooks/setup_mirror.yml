---
# =====================================================================
# Mirror setup: primary create → backup join → primary add-failover
# =====================================================================
# Order matters. configure.yml runs this twice (before/after production import).
#
# Run: ansible-playbook playbooks/setup_mirror.yml -i inventories/poc
# See docs/mirror-overview.md
- name: Configure mirror primary (create mirror set and databases)
  hosts: iris_primary
  become: false
  gather_facts: false

  roles:
    - iris_mirror_primary

- name: Configure mirror backup (join mirror set)
  hosts: iris_backup
  become: false
  gather_facts: false

  roles:
    - iris_mirror_backup

- name: Register backup failover member on primary
  hosts: iris_primary
  become: false
  gather_facts: false

  roles:
    - iris_mirror_primary_finalize
