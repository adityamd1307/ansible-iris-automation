---
- name: Configure Web Apps, Security, and Production Auto-Start
  hosts: iris_nodes
  become: false
  gather_facts: false

  tasks:
    - name: Load IRIS configuration variables
      include_vars:
        file: "{{ playbook_dir }}/../group_vars/iris_nodes.yml"

    - name: Ensure local target directory for feature scripts exists
      file:
        path: /tmp/iris_automation
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Create ObjectScript setup script for features
      copy:
        dest: "/tmp/iris_automation/{{ inventory_hostname }}-setup_features.os"
        content: |
          zn "%SYS"
          
          // 1. Setup Web App idempotently
          set appName = "{{ web_apps[0] }}"
          set ns = "{{ namespace }}"
          if '##class(Security.Applications).Exists(appName) {
              set props("AutheEnabled") = 32 // Password authentication
              set props("NameSpace") = ns
              set status = ##class(Security.Applications).Create(appName, .props)
              write !, "Changed: Web App "_appName_" created (Status: "_status_")"
          } else {
              write !, "OK: Web App "_appName_" already exists."
          }

          // 2. Setup Security Role/Resource idempotently
          if '##class(Security.Resources).Exists("%Resource_Training") {
              do ##class(Security.Resources).Create("%Resource_Training", "Training Resource")
              write !, "Changed: Resource %Resource_Training created."
          }
          if '##class(Security.Roles).Exists("TrainingRole") {
              do ##class(Security.Roles).Create("TrainingRole", "Role for training", "%Resource_Training:RW")
              write !, "Changed: Role TrainingRole created."
          }

          // 3. Set Production Auto-Start idempotently
          zn ns
          set prodClass = "{{ production.class }}"
          if ("{{ production.auto_start | lower }}" = "true") {
              // Only set if not already set to avoid unnecessary changes
              if ($get(^Ens.AutoStart) '= prodClass) {
                  set status = ##class(Ens.Director).SetAutoStart(prodClass)
                  write !, "Changed: Auto-start set for "_prodClass
              } else {
                  write !, "OK: Auto-start already configured for "_prodClass
              }
          }
          halt
        mode: '0644'
      delegate_to: localhost

    - name: Copy feature setup script into IRIS container
      command:
        argv:
          - docker
          - cp
          - "/tmp/iris_automation/{{ inventory_hostname }}-setup_features.os"
          - "{{ inventory_hostname }}:/tmp/setup_features.os"
      changed_when: false

    - name: Apply Web App, Security, and Production configuration
      shell: docker exec -i {{ inventory_hostname }} iris session IRIS < /tmp/iris_automation/{{ inventory_hostname }}-setup_features.os
      register: features_result
      # Idempotency check: mark changed only if the script outputs "Changed:"
      changed_when: "'Changed:' in features_result.stdout"
      failed_when: features_result.rc != 0 or 'ERROR' in features_result.stdout

    - name: Output Configuration Result
      debug:
        msg: "{{ features_result.stdout_lines }}"
