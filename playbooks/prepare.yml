- name: Prepare local IRIS automation workspace
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    project_root: "{{ playbook_dir }}/.."
    compose_file: "{{ project_root }}/docker-compose.yml"

  tasks:
    - name: Create runtime directories used by docker-compose volumes
      ansible.builtin.file:
        path: "{{ project_root }}/{{ item }}"
        state: directory
      loop: "{{ runtime_dirs }}"

    - name: Stat web gateway CSP mount paths
      ansible.builtin.stat:
        path: "{{ project_root }}/{{ item.value.dir }}/CSP.ini"
      loop: "{{ webgateway_configs | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: webgateway_csp_ini_stats

    - name: Remove mistaken CSP.ini directories from prior failed runs
      ansible.builtin.file:
        path: "{{ project_root }}/{{ item.item.value.dir }}/CSP.ini"
        state: absent
      loop: "{{ webgateway_csp_ini_stats.results }}"
      when: item.stat.isdir | default(false)

    - name: Stat web gateway CSP.conf mount paths
      ansible.builtin.stat:
        path: "{{ project_root }}/{{ item.value.dir }}/CSP.conf"
      loop: "{{ webgateway_configs | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: webgateway_csp_conf_stats

    - name: Remove mistaken CSP.conf directories from prior failed runs
      ansible.builtin.file:
        path: "{{ project_root }}/{{ item.item.value.dir }}/CSP.conf"
        state: absent
      loop: "{{ webgateway_csp_conf_stats.results }}"
      when: item.stat.isdir | default(false)

    - name: Seed shared Web Gateway Apache CSP.conf
      ansible.builtin.copy:
        src: "{{ project_root }}/config/webgateway/CSP.conf"
        dest: "{{ project_root }}/{{ item.value.dir }}/CSP.conf"
        mode: "0644"
      loop: "{{ webgateway_configs | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Seed per-node Web Gateway CSP.ini
      ansible.builtin.template:
        src: "{{ project_root }}/config/webgateway/CSP.ini.j2"
        dest: "{{ project_root }}/{{ item.value.dir }}/CSP.ini"
        mode: "0644"
      vars:
        webgateway_iris_host: "{{ item.value.iris_host }}"
        webgateway_server_name: "{{ item.value.server_name }}"
      loop: "{{ webgateway_configs | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Remove stale web gateway durable state so CSP mounts take effect
      ansible.builtin.file:
        path: "{{ project_root }}/{{ item.value.dir }}/durable"
        state: absent
      loop: "{{ webgateway_configs | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Write community compose override when no license key is required
      ansible.builtin.copy:
        dest: "{{ project_root }}/docker-compose.override.yml"
        mode: "0644"
        content: |
          # Auto-generated by prepare.yml for community / keyless images.
          services:
            irisa:
              command: --check-caps false
            irisb:
              command: --check-caps false
      when: not (require_iris_key | bool)

    - name: Remove community compose override when a license key is required
      ansible.builtin.file:
        path: "{{ project_root }}/docker-compose.override.yml"
        state: absent
      when: require_iris_key | bool

    - name: Seed HAProxy config (defaults to inventory primary gateway)
      ansible.builtin.template:
        src: "{{ project_root }}/config/haproxy/haproxy.cfg.j2"
        dest: "{{ project_root }}/haproxy/haproxy.cfg"
        mode: "0644"
      vars:
        haproxy_backend_host: "{{ haproxy_primary_backends[haproxy_initial_primary].host }}"
        haproxy_backend_ip: "{{ haproxy_primary_backends[haproxy_initial_primary].ip }}"

    - name: Write docker compose image tag environment
      ansible.builtin.copy:
        dest: "{{ project_root }}/.env"
        unsafe_writes: true
        content: |
          IRISTAG={{ iris_image }}
          WEBGTAG={{ webgateway_image }}

    - name: Verify IRIS license key source exists
      ansible.builtin.stat:
        path: "{{ iris_key_source }}"
      register: iris_key_source_stat
      when: iris_key_source | length > 0

    - name: Stop early when iris_key_source path is missing
      ansible.builtin.fail:
        msg: >-
          iris_key_source={{ iris_key_source }} does not exist.
          Provide the full path to your .ISCkey file.
      when:
        - iris_key_source | length > 0
        - not iris_key_source_stat.stat.exists

    - name: Copy IRIS license key when a source path is provided
      ansible.builtin.copy:
        src: "{{ iris_key_source }}"
        dest: "{{ project_root }}/{{ item }}"
        mode: "0600"
        unsafe_writes: true
      loop: "{{ iris_key_targets }}"
      when: iris_key_source | length > 0
      no_log: true

    - name: Check for IRIS license keys expected by docker-compose
      ansible.builtin.stat:
        path: "{{ project_root }}/{{ item }}"
      loop: "{{ iris_key_targets }}"
      register: iris_key_stats
      when: require_iris_key | bool

    - name: Stop early when required IRIS license keys are missing
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: >-
          Missing {{ item.item }}. Put iris.key in both irisa/ and irisb/, or run with
          -e iris_key_source=/path/to/iris.key, or set -e require_iris_key=false if
          your selected image does not need a key.
      loop: "{{ iris_key_stats.results | default([]) }}"
      when: require_iris_key | bool

    - name: Validate docker compose syntax
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ compose_file }}"
          - config
          - --quiet
        chdir: "{{ project_root }}"
      changed_when: false
      environment:
        IRISTAG: "{{ iris_image }}"
        WEBGTAG: "{{ webgateway_image }}"
