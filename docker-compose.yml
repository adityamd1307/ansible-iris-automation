services:

  #
  # IRIS A
  #
  irisa:
    image: ${IRISTAG}
    init: true
    container_name: irisa
    hostname: irisa

    ports:
      - "51774:1972"
      - "52773:52773"
      - "21881:2188"

    environment:
      - ISC_DATA_DIRECTORY=/iris-shared/durable

    volumes:
      - ./irisa:/iris-shared

    command: --key /iris-shared/iris.key

    cap_add:
      - NET_ADMIN

    networks:
      iris_net:
        ipv4_address: 172.28.0.10


  #
  # IRIS B
  #
  irisb:
    image: ${IRISTAG}
    init: true
    container_name: irisb
    hostname: irisb

    ports:
      - "61773:1972"
      - "62773:52773"
      - "21882:2188"

    environment:
      - ISC_DATA_DIRECTORY=/iris-shared/durable

    volumes:
      - ./irisb:/iris-shared

    command: --key /iris-shared/iris.key

    cap_add:
      - NET_ADMIN

    networks:
      iris_net:
        ipv4_address: 172.28.0.11


  #
  # Web Gateway A
  #
  webgatewaya:
    image: ${WEBGTAG}
    init: true
    container_name: webgatewaya
    hostname: webgatewaya

    ports:
      - "8081:80"

    environment:
      - ISC_DATA_DIRECTORY=/webgateway-shared/durable
      - ISC_CSP_CONF_FILE=/webgateway-shared/CSP.conf
      - ISC_CSP_INI_FILE=/webgateway-shared/CSP.ini

    volumes:
      - ./webgatewaya:/webgateway-shared

    depends_on:
      - irisa

    networks:
      iris_net:
        ipv4_address: 172.28.0.20


  #
  # Web Gateway B
  #
  webgatewayb:
    image: ${WEBGTAG}
    init: true
    container_name: webgatewayb
    hostname: webgatewayb

    ports:
      - "8082:80"

    environment:
      - ISC_DATA_DIRECTORY=/webgateway-shared/durable
      - ISC_CSP_CONF_FILE=/webgateway-shared/CSP.conf
      - ISC_CSP_INI_FILE=/webgateway-shared/CSP.ini

    volumes:
      - ./webgatewayb:/webgateway-shared

    depends_on:
      - irisb

    networks:
      iris_net:
        ipv4_address: 172.28.0.21


  #
  # Arbiter
  #
  arbiter:
    image: containers.intersystems.com/intersystems/arbiter:latest-cd

    init: true
    container_name: arbiter
    hostname: arbiter

    ports:
      - "21883:2188"

    environment:
      - ISC_DATA_DIRECTORY=/arbiter-shared/durable

    volumes:
      - ./arbiter:/arbiter-shared

    networks:
      iris_net:
        ipv4_address: 172.28.0.30


  #
  # HAProxy
  #
  haproxy:
    image: haproxy:latest

    container_name: haproxy
    hostname: haproxy

    ports:
      - "8080:80"
      - "8443:443"

    volumes:
      - ./haproxy:/usr/local/etc/haproxy

    depends_on:
      - webgatewaya
      - webgatewayb

    networks:
      iris_net:
        ipv4_address: 172.28.0.40


networks:
  iris_net:
    driver: bridge

    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1